name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: TypeScript build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 7
      - run: npm run build
      - run: npm test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  python:
    name: AI service tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      AI_DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r services/ai/requirements.txt
      - name: Run AI tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s services/ai/tests -p "test_*.py" -v 2>&1 | tee python-tests.log
      - name: Upload AI test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-diagnostics
          path: python-tests.log
          if-no-files-found: ignore
          retention-days: 7

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
