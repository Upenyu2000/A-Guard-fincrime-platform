name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_USER: ci-placeholder-user
      POSTGRES_PASSWORD: ci-placeholder-password
      POSTGRES_DB: african_guard_ci
      DATABASE_URL: postgresql://ci-placeholder-user:ci-placeholder-password@postgres:5432/african_guard_ci
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_USERNAME: ci-placeholder-user
      KAFKA_PASSWORD: ci-placeholder-password
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ci-placeholder-user
      NEO4J_PASSWORD: ci-placeholder-password
      AI_SERVICE_TOKEN: ci-placeholder-risk-service-token
      JWT_SECRET: ci-placeholder-jwt-secret-value-12345
      CONSORTIUM_SHARED_SECRET: ci-placeholder-consortium-secret-value
      PUBLIC_API_GATEWAY_URL: http://api:4000
      PUBLIC_WS_GATEWAY_URL: http://api:4000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Type-check and build workspaces
        run: |
          npm run typecheck
          npm run test:aml
          npm run test:security
          npm run security:secrets
          npm run build
          npm run security:bundle

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build web and API images
        run: docker compose build web api

      - name: Start web container
        run: docker run --detach --name african-guard-web-ci --publish 3000:3000 african-guard-web

      - name: Verify page and Next.js assets
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /tmp/index.html; then
              break
            fi
            sleep 2
          done

          python - <<'PY'
          import re
          import urllib.parse
          import urllib.request

          base = "http://127.0.0.1:3000/"
          html = urllib.request.urlopen(base, timeout=10).read().decode("utf-8")
          assets = sorted(set(re.findall(r'(?:src|href)="([^"]*_next/static/[^"]+)"', html)))
          if not assets:
              raise SystemExit("No Next.js static assets were found in the rendered page.")

          for asset in assets:
              url = urllib.parse.urljoin(base, asset)
              response = urllib.request.urlopen(url, timeout=10)
              if response.status != 200:
                  raise SystemExit(f"Asset returned {response.status}: {url}")
              print(f"200 {url}")
          PY

      - name: Show web logs on failure
        if: failure()
        run: docker logs african-guard-web-ci || true
