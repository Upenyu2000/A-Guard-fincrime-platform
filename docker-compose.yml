services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: african_guard
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in an untracked local environment file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in an untracked local environment file}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d african_guard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    expose:
      - "2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    expose:
      - "29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:?Set NEO4J_USER in an untracked local environment file}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in an untracked local environment file}
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j-data:/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in an untracked local environment file}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      AI_SERVICE_URL: http://ai:8001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?Set AI_SERVICE_TOKEN in an untracked local environment file}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in an untracked local environment file}
      CONSORTIUM_SHARED_SECRET: ${CONSORTIUM_SHARED_SECRET:?Set CONSORTIUM_SHARED_SECRET in an untracked local environment file}
      ALLOW_DEV_HEADER_AUTH: ${ALLOW_DEV_HEADER_AUTH:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - postgres
      - redis
      - kafka
      - neo4j
      - ai
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?Set AI_SERVICE_TOKEN in an untracked local environment file}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PUBLIC_API_GATEWAY_URL: ${PUBLIC_API_GATEWAY_URL:-http://api:4000}
      PUBLIC_WS_GATEWAY_URL: ${PUBLIC_WS_GATEWAY_URL:-http://api:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
