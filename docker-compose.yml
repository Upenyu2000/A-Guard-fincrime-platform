services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: african_guard
      POSTGRES_USER: african_guard
      POSTGRES_PASSWORD: african_guard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U african_guard -d african_guard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/african_guard
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://african_guard:african_guard@postgres:5432/african_guard?schema=public
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      AI_SERVICE_URL: http://ai:8001
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - kafka
      - neo4j
      - ai

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    ports:
      - "8001:8001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
