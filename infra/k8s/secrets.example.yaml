apiVersion: v1
kind: Secret
metadata:
  name: african-guard-secrets
  namespace: african-guard
type: Opaque
stringData:
  database-url: "<server-only-database-url>"
  redis-url: "<server-only-redis-url>"
  kafka-brokers: "<server-only-kafka-brokers>"
  neo4j-uri: "<server-only-neo4j-uri>"
  ai-service-url: "<private-server-only-service-url>"
  ai-service-token: "<server-only-secret>"
  jwt-secret: "<generate-outside-git>"
  consortium-shared-secret: "<generate-outside-git>"
