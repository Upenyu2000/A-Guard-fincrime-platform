apiVersion: apps/v1
kind: Deployment
metadata:
  name: african-guard-web
  namespace: african-guard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: african-guard-web
  template:
    metadata:
      labels:
        app: african-guard-web
    spec:
      containers:
        - name: web
          image: african-guard/web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.african-guard.example
            - name: NEXT_PUBLIC_WS_URL
              value: https://api.african-guard.example
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: african-guard-web
  namespace: african-guard
spec:
  selector:
    app: african-guard-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
