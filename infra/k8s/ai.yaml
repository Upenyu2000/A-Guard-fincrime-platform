apiVersion: apps/v1
kind: Deployment
metadata:
  name: african-guard-ai
  namespace: african-guard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: african-guard-ai
  template:
    metadata:
      labels:
        app: african-guard-ai
    spec:
      containers:
        - name: ai
          image: african-guard/ai:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: AI_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: ai-service-token
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: african-guard-ai
  namespace: african-guard
spec:
  type: ClusterIP
  selector:
    app: african-guard-ai
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: african-guard-ai-ingress
  namespace: african-guard
spec:
  podSelector:
    matchLabels:
      app: african-guard-ai
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: african-guard-api
      ports:
        - protocol: TCP
          port: 8001
