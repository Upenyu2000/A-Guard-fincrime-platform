apiVersion: apps/v1
kind: Deployment
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: african-guard-api
  template:
    metadata:
      labels:
        app: african-guard-api
    spec:
      containers:
        - name: api
          image: african-guard/api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: kafka-brokers
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: neo4j-uri
            - name: AI_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: ai-service-url
            - name: AI_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: ai-service-token
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: jwt-secret
            - name: CONSORTIUM_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: consortium-shared-secret
            - name: ALLOW_DEV_HEADER_AUTH
              value: "false"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  type: ClusterIP
  selector:
    app: african-guard-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
