apiVersion: v1
kind: ServiceAccount
metadata:
  name: african-guard-api
  namespace: african-guard
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: african-guard-api
  template:
    metadata:
      labels:
        app: african-guard-api
    spec:
      serviceAccountName: african-guard-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: african-guard/api:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: OUTBOX_DISPATCH_ENABLED
              value: "true"
            - name: DEMO_MODE
              value: "false"
            - name: AI_DEMO_MODE
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: kafka-brokers
            - name: AI_SERVICE_URL
              value: http://african-guard-ai:8001
            - name: OAUTH_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: oauth-issuer-url
            - name: OAUTH_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: oauth-audience
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: cors-allowed-origins
            - name: ENCRYPTION_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: encryption-master-key
            - name: ENCRYPTION_KEY_REF
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: encryption-key-ref
            - name: API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: african-guard-secrets
                  key: api-key-pepper
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /v1/live/health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/live/health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/live/health/live
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  selector:
    app: african-guard-api
  ports:
    - name: http
      port: 4000
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: african-guard-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: african-guard-api
  namespace: african-guard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: african-guard-api
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
